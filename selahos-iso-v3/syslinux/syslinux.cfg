UI vesamenu.c32
MENU TITLE SelahOS v1.0-beta
MENU CLEAR
DEFAULT selahos
TIMEOUT 150
PROMPT 0

LABEL selahos
    MENU LABEL ^Boot SelahOS v1.0-beta (Live)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G

LABEL selahos-lts
    MENU LABEL Boot SelahOS v1.0-beta (^LTS kernel)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G

LABEL selahos-safe
    MENU LABEL Boot SelahOS (^Safe graphics)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset

LABEL reboot
    MENU LABEL ^Reboot
    COM32 reboot.c32
