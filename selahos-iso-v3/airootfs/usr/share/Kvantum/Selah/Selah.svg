<?xml version="1.0" encoding="UTF-8"?>
<!--
  Selah Kvantum SVG skin
  Each <g id="..."> element is referenced by name in Selah.kvconfig.
  Layout: elements stacked vertically; Kvantum reads them by id, not position.
  Design: flat, dark, warm — no gradients.

  Color palette:
    BG main     #0B0F1A   panel       #131926   hover    #1E2840
    pressed     #0D1020   active      #1A2035   alt-bg   #0F1322
    border      #2A3042   gold        #D6A85A   teal     #8EC3B8
    disabled    #1A1F2E   dis-border  #1E2535
-->
<svg xmlns="http://www.w3.org/2000/svg" width="140" height="2600">

  <!-- ════════════════════════════════════
       PUSH BUTTONS  (100 × 30)
       frame margins: top=5 bottom=5 left=8 right=8
       ════════════════════════════════════ -->

  <g id="button" transform="translate(0,0)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <g id="button-hover" transform="translate(0,35)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#1E2840" stroke="#8EC3B8" stroke-width="1.5"/>
  </g>

  <g id="button-pressed" transform="translate(0,70)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#0D1020" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="button-toggled" transform="translate(0,105)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#1A2035" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="button-disabled" transform="translate(0,140)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#0F141F" stroke="#1E2535" stroke-width="1"/>
  </g>

  <!-- default action button — gold-tinted -->
  <g id="button-default" transform="translate(0,175)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#1A2035" stroke="#D6A85A" stroke-width="2"/>
  </g>

  <g id="button-focus" transform="translate(0,210)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="#131926" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       LINE EDIT / SPIN  (100 × 28)
       frame margins: top=4 bottom=4 left=6 right=6
       ════════════════════════════════════ -->

  <g id="lineedit" transform="translate(0,250)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <g id="lineedit-focus" transform="translate(0,283)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="lineedit-disabled" transform="translate(0,316)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#1E2535" stroke-width="1"/>
  </g>

  <g id="spin" transform="translate(0,349)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <g id="spin-hover" transform="translate(0,382)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#8EC3B8" stroke-width="1.5"/>
  </g>

  <g id="spin-focus" transform="translate(0,415)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="spin-disabled" transform="translate(0,448)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0B0F1A" stroke="#1E2535" stroke-width="1"/>
  </g>

  <!-- ════════════════════════════════════
       COMBO BOX  (100 × 28)
       ════════════════════════════════════ -->

  <g id="combobox" transform="translate(0,482)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <g id="combobox-hover" transform="translate(0,515)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#1E2840" stroke="#8EC3B8" stroke-width="1.5"/>
  </g>

  <g id="combobox-pressed" transform="translate(0,548)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0D1020" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="combobox-disabled" transform="translate(0,581)">
    <rect x="1" y="1" width="98" height="26" rx="4" ry="4"
          fill="#0F141F" stroke="#1E2535" stroke-width="1"/>
  </g>

  <!-- dropdown arrow button portion of combobox (20 × 28) -->
  <g id="combobox-dd" transform="translate(0,614)">
    <rect x="1" y="1" width="18" height="26" rx="3" ry="3"
          fill="#1A2035" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="combobox-dd-hover" transform="translate(0,647)">
    <rect x="1" y="1" width="18" height="26" rx="3" ry="3"
          fill="#1E2840" stroke="#8EC3B8" stroke-width="1"/>
  </g>

  <g id="combobox-dd-pressed" transform="translate(0,680)">
    <rect x="1" y="1" width="18" height="26" rx="3" ry="3"
          fill="#0D1020" stroke="#D6A85A" stroke-width="1"/>
  </g>

  <!-- ════════════════════════════════════
       FRAME / CONTAINER  (100 × 80)
       frame margins: top=6 bottom=6 left=6 right=6
       ════════════════════════════════════ -->

  <g id="frame" transform="translate(0,714)">
    <rect x="1" y="1" width="98" height="78" rx="5" ry="5"
          fill="#0B0F1A" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <g id="tabframe" transform="translate(0,798)">
    <rect x="1" y="1" width="98" height="78" rx="4" ry="4"
          fill="#0B0F1A" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       TABS  (84 × 30)
       frame margins: top=4 bottom=0 left=6 right=6
       Active tab has gold top border accent
       ════════════════════════════════════ -->

  <!-- inactive tab -->
  <g id="tab" transform="translate(0,882)">
    <rect x="1" y="1" width="82" height="28" rx="4" ry="4"
          fill="#131926" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="tab-hover" transform="translate(0,917)">
    <rect x="1" y="1" width="82" height="28" rx="4" ry="4"
          fill="#1E2840" stroke="#8EC3B8" stroke-width="1"/>
  </g>

  <!-- active / toggled tab — open at bottom, gold top line -->
  <g id="tab-toggled" transform="translate(0,952)">
    <rect x="1" y="1" width="82" height="28" rx="4" ry="4"
          fill="#0B0F1A" stroke="#2A3042" stroke-width="1"/>
    <!-- gold accent line across top -->
    <rect x="6" y="1" width="70" height="2.5" rx="1"
          fill="#D6A85A"/>
  </g>

  <g id="tab-focus" transform="translate(0,987)">
    <rect x="1" y="1" width="82" height="28" rx="4" ry="4"
          fill="#131926" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       MENU  (120 × 120)
       frame margins: top=6 bottom=6 left=6 right=6
       ════════════════════════════════════ -->

  <g id="menu" transform="translate(0,1022)">
    <rect x="1" y="1" width="118" height="118" rx="6" ry="6"
          fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       MENU ITEMS  (120 × 26)
       ════════════════════════════════════ -->

  <!-- transparent by default — shows through menu background -->
  <g id="menuitem" transform="translate(0,1147)">
    <rect x="0" y="0" width="120" height="26"
          fill="#131926" fill-opacity="0"/>
  </g>

  <!-- selected menu item — gold highlight -->
  <g id="menuitem-selected" transform="translate(0,1178)">
    <rect x="2" y="1" width="116" height="24" rx="3" ry="3"
          fill="#D6A85A"/>
  </g>

  <!-- ════════════════════════════════════
       TOOLBAR  (120 × 36)
       ════════════════════════════════════ -->

  <g id="toolbar" transform="translate(0,1210)">
    <rect x="0" y="0" width="120" height="36"
          fill="#0F1322"/>
    <!-- subtle bottom separator -->
    <rect x="0" y="35" width="120" height="1"
          fill="#2A3042"/>
  </g>

  <!-- ════════════════════════════════════
       PANEL / TOOLBAR BUTTONS  (32 × 32)
       frame margins: top=3 bottom=3 left=4 right=4
       ════════════════════════════════════ -->

  <!-- transparent normal state -->
  <g id="panelbutton" transform="translate(0,1252)">
    <rect x="1" y="1" width="30" height="30" rx="4" ry="4"
          fill="#0F1322" fill-opacity="0"/>
  </g>

  <g id="panelbutton-hover" transform="translate(0,1290)">
    <rect x="1" y="1" width="30" height="30" rx="4" ry="4"
          fill="#1E2840"/>
  </g>

  <g id="panelbutton-pressed" transform="translate(0,1328)">
    <rect x="1" y="1" width="30" height="30" rx="4" ry="4"
          fill="#131926" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="panelbutton-toggled" transform="translate(0,1366)">
    <rect x="1" y="1" width="30" height="30" rx="4" ry="4"
          fill="#1A2035" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       TOOLTIP  (120 × 32)
       frame margins: top=5 bottom=5 left=8 right=8
       ════════════════════════════════════ -->

  <g id="tooltip" transform="translate(0,1404)">
    <rect x="1" y="1" width="118" height="30" rx="5" ry="5"
          fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       SCROLLBAR  (10 × 80)  — groove
       ════════════════════════════════════ -->

  <g id="scrollbar" transform="translate(0,1442)">
    <rect x="0" y="0" width="10" height="80" rx="5" ry="5"
          fill="#0B0F1A"/>
  </g>

  <!-- ════════════════════════════════════
       SCROLLBAR SLIDER  (10 × 50)
       frame margins: top=4 bottom=4 left=2 right=2
       ════════════════════════════════════ -->

  <g id="scrollbarslider" transform="translate(0,1528)">
    <rect x="2" y="1" width="6" height="48" rx="3" ry="3"
          fill="#2A3042"/>
  </g>

  <g id="scrollbarslider-hover" transform="translate(0,1584)">
    <rect x="2" y="1" width="6" height="48" rx="3" ry="3"
          fill="#D6A85A"/>
  </g>

  <g id="scrollbarslider-pressed" transform="translate(0,1640)">
    <rect x="2" y="1" width="6" height="48" rx="3" ry="3"
          fill="#D6A85A" fill-opacity="0.8"/>
  </g>

  <!-- ════════════════════════════════════
       PROGRESS BAR  (100 × 10)
       frame margins: top=2 bottom=2 left=2 right=2
       ════════════════════════════════════ -->

  <g id="progressbar" transform="translate(0,1696)">
    <rect x="1" y="1" width="98" height="8" rx="4" ry="4"
          fill="#1A2035" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="progressbarcontents" transform="translate(0,1712)">
    <rect x="0" y="1" width="100" height="8" rx="4" ry="4"
          fill="#D6A85A"/>
  </g>

  <!-- ════════════════════════════════════
       SLIDER GROOVE  (100 × 6)
       ════════════════════════════════════ -->

  <g id="slider" transform="translate(0,1728)">
    <rect x="1" y="1" width="98" height="4" rx="2" ry="2"
          fill="#1A2035" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="slider-filled" transform="translate(0,1740)">
    <rect x="0" y="1" width="100" height="4" rx="2" ry="2"
          fill="#D6A85A"/>
  </g>

  <!-- ════════════════════════════════════
       SLIDER HANDLE  (18 × 18)
       frame margins: top=4 bottom=4 left=4 right=4
       ════════════════════════════════════ -->

  <g id="sliderhandle" transform="translate(0,1752)">
    <circle cx="9" cy="9" r="8"
            fill="#1A2035" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <g id="sliderhandle-hover" transform="translate(0,1778)">
    <circle cx="9" cy="9" r="8"
            fill="#2A3042" stroke="#D6A85A" stroke-width="2"/>
  </g>

  <g id="sliderhandle-pressed" transform="translate(0,1804)">
    <circle cx="9" cy="9" r="8"
            fill="#D6A85A" stroke="#D6A85A" stroke-width="1.5"/>
  </g>

  <!-- ════════════════════════════════════
       CHECKBOX  (20 × 20)
       frame margins: top=3 bottom=3 left=3 right=3
       ════════════════════════════════════ -->

  <!-- unchecked -->
  <g id="checkbox" transform="translate(0,1830)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <!-- checked — gold fill + dark check mark -->
  <g id="checkbox-checked" transform="translate(0,1856)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#D6A85A" stroke="#D6A85A" stroke-width="1"/>
    <path d="M5,10.5 L8.5,14 L15,7"
          stroke="#0B0F1A" stroke-width="2.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g id="checkbox-hover" transform="translate(0,1882)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#1E2840" stroke="#8EC3B8" stroke-width="1.5"/>
  </g>

  <g id="checkbox-checked-hover" transform="translate(0,1908)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#D6A85A" stroke="#8EC3B8" stroke-width="1.5"/>
    <path d="M5,10.5 L8.5,14 L15,7"
          stroke="#0B0F1A" stroke-width="2.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g id="checkbox-disabled" transform="translate(0,1934)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#0F141F" stroke="#1E2535" stroke-width="1"/>
  </g>

  <g id="checkbox-checked-disabled" transform="translate(0,1960)">
    <rect x="1" y="1" width="18" height="18" rx="3" ry="3"
          fill="#5A5347" stroke="#5A5347" stroke-width="1"/>
    <path d="M5,10.5 L8.5,14 L15,7"
          stroke="#0B0F1A" stroke-width="2.2" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ════════════════════════════════════
       RADIO BUTTON  (20 × 20)
       frame margins: top=3 bottom=3 left=3 right=3
       ════════════════════════════════════ -->

  <g id="radiobutton" transform="translate(0,1986)">
    <circle cx="10" cy="10" r="9"
            fill="#131926" stroke="#2A3042" stroke-width="1.5"/>
  </g>

  <!-- checked — outer ring stays, inner dot = gold -->
  <g id="radiobutton-checked" transform="translate(0,2012)">
    <circle cx="10" cy="10" r="9"
            fill="#131926" stroke="#D6A85A" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="4.5"
            fill="#D6A85A"/>
  </g>

  <g id="radiobutton-hover" transform="translate(0,2038)">
    <circle cx="10" cy="10" r="9"
            fill="#1E2840" stroke="#8EC3B8" stroke-width="1.5"/>
  </g>

  <g id="radiobutton-checked-hover" transform="translate(0,2064)">
    <circle cx="10" cy="10" r="9"
            fill="#1E2840" stroke="#D6A85A" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="4.5"
            fill="#D6A85A"/>
  </g>

  <g id="radiobutton-disabled" transform="translate(0,2090)">
    <circle cx="10" cy="10" r="9"
            fill="#0F141F" stroke="#1E2535" stroke-width="1"/>
  </g>

  <!-- ════════════════════════════════════
       DOCK  (100 × 30)
       ════════════════════════════════════ -->

  <g id="dock" transform="translate(0,2116)">
    <rect x="0" y="0" width="100" height="30"
          fill="#0F1322" stroke="#2A3042" stroke-width="1"/>
  </g>

  <g id="dock-header" transform="translate(0,2152)">
    <rect x="0" y="0" width="100" height="24"
          fill="#1A2035" stroke="#2A3042" stroke-width="1"/>
    <!-- subtle gold left accent bar -->
    <rect x="0" y="0" width="3" height="24"
          fill="#D6A85A"/>
  </g>

  <!-- ════════════════════════════════════
       SPLITTER  (8 × 40)
       ════════════════════════════════════ -->

  <g id="splitter" transform="translate(0,2182)">
    <rect x="0" y="0" width="8" height="40"
          fill="#1A2035"/>
    <!-- center grip dots -->
    <circle cx="4" cy="17" r="1.2" fill="#2A3042"/>
    <circle cx="4" cy="22" r="1.2" fill="#2A3042"/>
    <circle cx="4" cy="27" r="1.2" fill="#2A3042"/>
  </g>

  <!-- ════════════════════════════════════
       STATUS BAR  (100 × 22)
       ════════════════════════════════════ -->

  <g id="statusbar" transform="translate(0,2228)">
    <rect x="0" y="0" width="100" height="22"
          fill="#0B0F1A"/>
    <rect x="0" y="0" width="100" height="1"
          fill="#2A3042"/>
  </g>

  <!-- ════════════════════════════════════
       FOCUS RING  (100 × 30)
       frame margins: top=2 bottom=2 left=2 right=2
       Transparent fill, gold border
       ════════════════════════════════════ -->

  <g id="focus" transform="translate(0,2256)">
    <rect x="1" y="1" width="98" height="28" rx="5" ry="5"
          fill="none" stroke="#D6A85A" stroke-width="1.5"
          stroke-dasharray="4,3"/>
  </g>

  <!-- ════════════════════════════════════
       WINDOW / DIALOG BACKGROUND  (100 × 100)
       ════════════════════════════════════ -->

  <g id="window" transform="translate(0,2292)">
    <rect x="0" y="0" width="100" height="100"
          fill="#0B0F1A"/>
  </g>

</svg>
