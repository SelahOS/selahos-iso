<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plasma panel background — 9-piece scalable SVG.
  Named elements: center, top, bottom, left, right,
                  topleft, topright, bottomleft, bottomright
  Panel color: #0F1322 with a 1px top border in #2A3042.
  The panel lives at the bottom of the screen by default;
  the border sits on the interior (top) edge of the panel.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="100" height="100"
     viewBox="0 0 100 100">

  <!-- panel background fill (full area) -->
  <rect id="center" x="10" y="10" width="80" height="80"
        fill="#0F1322"/>

  <!-- top edge — carries the 1px separator line -->
  <rect id="top" x="10" y="0" width="80" height="10"
        fill="#0F1322"/>
  <rect x="10" y="0" width="80" height="1.5"
        fill="#2A3042"/>

  <!-- bottom edge -->
  <rect id="bottom" x="10" y="90" width="80" height="10"
        fill="#0F1322"/>

  <!-- side edges -->
  <rect id="left"  x="0" y="10" width="10" height="80"
        fill="#0F1322"/>
  <rect id="right" x="90" y="10" width="10" height="80"
        fill="#0F1322"/>

  <!-- corners -->
  <rect id="topleft"     x="0"  y="0"  width="10" height="10" fill="#0F1322"/>
  <rect id="topright"    x="90" y="0"  width="10" height="10" fill="#0F1322"/>
  <rect id="bottomleft"  x="0"  y="90" width="10" height="10" fill="#0F1322"/>
  <rect id="bottomright" x="90" y="90" width="10" height="10" fill="#0F1322"/>

  <!-- optional: shadow hint element for Plasma compositing -->
  <rect id="hint-top-margin"    x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-left-margin"   x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-right-margin"  x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-bottom-margin" x="0" y="0" width="1" height="1" fill="none"/>

</svg>
