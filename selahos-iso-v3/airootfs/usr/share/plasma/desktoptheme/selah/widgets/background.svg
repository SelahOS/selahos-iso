<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plasma popup / widget background — 9-piece scalable SVG.
  Used for applet popups, tooltips, notification panels, etc.
  Color: #131926 panel with 1.5px #2A3042 border and 6px corner radius.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="100" height="100"
     viewBox="0 0 100 100">

  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#161D2E"/>
      <stop offset="1"   stop-color="#0F1322"/>
    </linearGradient>
  </defs>

  <!-- center fill (no border, no corners) -->
  <rect id="center" x="10" y="10" width="80" height="80"
        fill="url(#bggrad)"/>

  <!-- edges — each carries half the border visually -->
  <rect id="top"    x="10" y="0"  width="80" height="10" fill="#161D2E"/>
  <rect id="bottom" x="10" y="90" width="80" height="10" fill="#0F1322"/>
  <rect id="left"   x="0"  y="10" width="10" height="80" fill="#131926"/>
  <rect id="right"  x="90" y="10" width="10" height="80" fill="#131926"/>

  <!-- rounded corners — each is a 10×10 piece of the overall corner -->
  <svg id="topleft" x="0" y="0" width="10" height="10" viewBox="0 0 10 10">
    <rect x="0" y="0" width="10" height="10" fill="#0B0F1A"/>
    <path d="M10,10 L6,10 Q0,10 0,4 L0,0 L10,0 Z" fill="#161D2E"/>
    <path d="M10,10 Q6,10 1.5,8.5 Q0,7 0,4" fill="none"
          stroke="#2A3042" stroke-width="1.5"/>
  </svg>

  <svg id="topright" x="90" y="0" width="10" height="10" viewBox="0 0 10 10">
    <rect x="0" y="0" width="10" height="10" fill="#0B0F1A"/>
    <path d="M0,10 L4,10 Q10,10 10,4 L10,0 L0,0 Z" fill="#161D2E"/>
    <path d="M0,10 Q4,10 8.5,8.5 Q10,7 10,4" fill="none"
          stroke="#2A3042" stroke-width="1.5"/>
  </svg>

  <svg id="bottomleft" x="0" y="90" width="10" height="10" viewBox="0 0 10 10">
    <rect x="0" y="0" width="10" height="10" fill="#0B0F1A"/>
    <path d="M10,0 L6,0 Q0,0 0,6 L0,10 L10,10 Z" fill="#0F1322"/>
    <path d="M10,0 Q6,0 1.5,1.5 Q0,3 0,6" fill="none"
          stroke="#2A3042" stroke-width="1.5"/>
  </svg>

  <svg id="bottomright" x="90" y="90" width="10" height="10" viewBox="0 0 10 10">
    <rect x="0" y="0" width="10" height="10" fill="#0B0F1A"/>
    <path d="M0,0 L4,0 Q10,0 10,6 L10,10 L0,10 Z" fill="#0F1322"/>
    <path d="M0,0 Q4,0 8.5,1.5 Q10,3 10,6" fill="none"
          stroke="#2A3042" stroke-width="1.5"/>
  </svg>

  <!-- margin hints for Plasma shadow/blur -->
  <rect id="hint-top-margin"    x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-left-margin"   x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-right-margin"  x="0" y="0" width="1" height="1" fill="none"/>
  <rect id="hint-bottom-margin" x="0" y="0" width="1" height="1" fill="none"/>

</svg>
