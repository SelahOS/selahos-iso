# SelahBridgePro v1 — Main Configuration
# /etc/selahbridgepro/selahbridgepro.conf
# Selah Technologies LLC — Copyright (C) 2026

# ── Runtime ───────────────────────────────────────────────────────────────────
SELAHPRO_VERSION="1.0.0"
SELAHPRO_WINE_RUNTIME="wine-staging"
SELAHPRO_PROFILE_DIR="/etc/selahbridgepro/profiles"
SELAHPRO_LOG_DIR="/var/log/selahbridgepro"

# ── Default audio settings ───────────────────────────────────────────────────
SELAHPRO_DEFAULT_RATE=48000
SELAHPRO_DEFAULT_BUFFER=256

# ── Wine prefix base path ────────────────────────────────────────────────────
# Individual DAW prefixes are $HOME/.wine-selah-<profile>
SELAHPRO_PREFIX_BASE="$HOME/.wine-selah"

# ── License ───────────────────────────────────────────────────────────────────
SELAHPRO_LIC_DIR="/etc/selahbridgepro"
SELAHPRO_TRIAL_DAYS=14
SELAHPRO_SUPPORT="support@selahtechnologies.com"

# ── MIDI ─────────────────────────────────────────────────────────────────────
SELAHPRO_MIDI_ENABLED=1
SELAHPRO_MIDI_SYSEX=1
SELAHPRO_MIDI_PASSTHROUGH=1

# ── Telemetry ────────────────────────────────────────────────────────────────
# SelahBridgePro collects NO telemetry. This key is here for documentation.
SELAHPRO_TELEMETRY=0
