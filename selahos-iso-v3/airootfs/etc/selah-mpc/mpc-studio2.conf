# ─────────────────────────────────────────────────────────────────────────────
#  SelahMPC Bridge — MPC Studio 2 configuration
#  /etc/selah-mpc/mpc-studio2.conf
#
#  Apply changes without restart:  selah-mpc-bridge reload
#  Discover your MPC's MIDI layout: selah-mpc-bridge monitor  (hit pads)
# ─────────────────────────────────────────────────────────────────────────────

[device]
# Comma-separated port name fragments (first match wins, case-insensitive)
port_names = MPC Studio MPC Public,MPC Studio 2,MPC Studio
# Seconds between reconnect attempts when device is unplugged
reconnect_interval = 2

[midi]
# MIDI channel the MPC sends pad notes on (1-16)
# MPC Studio 2 factory default: channel 1
pad_channel = 1
# MIDI channel for Q-Link knob CC output forwarded to DAW
cc_channel = 1
# MIDI channel the bridge listens on for LED feedback from the DAW
feedback_channel = 1

[pads]
# MIDI note the MPC sends for pad 1 (bottom-left physical pad).
# MPC Studio 2 factory default: 36 (C2).
# Run 'selah-mpc-bridge monitor' and hit pad 1 to confirm.
input_root = 36

# ── Output mapping ─────────────────────────────────────────────────────────
# passthrough    Forward pad notes unchanged to the DAW (default)
# chromatic      Pad 1 → root_note, pad 2 → root_note+1, pad 3 → root_note+2 …
# scale          Pad 1 → root_note, subsequent pads follow scale degrees
# drum           GM drum map starting at root_note (36 = kick drum)
layout = passthrough

# Root output note for chromatic / scale / drum layouts
# 36 = C2   48 = C3   60 = C4 (middle C)
root_note = 36

# Scale used when layout = scale
# Options: major  minor  pentatonic_major  pentatonic_minor  blues
#          dorian  lydian  mixolydian  harmonic_minor  chromatic
scale = pentatonic_minor

# Additional semitone shift applied after layout mapping (-48 to +48)
transpose = 0

[velocity]
# How pad velocity is shaped before forwarding to the DAW
# linear    1:1 — exactly what you play
# soft      Boosts quieter hits — good for finger drumming
# hard      Compresses loud hits — even dynamics
# fixed     Always sends velocity 100 — useful for step-programming
curve = linear

# Clamp output velocity to this window (1-127)
min_velocity = 1
max_velocity = 127

[leds]
# Light up the physical pad LED on hit, off on release
mirror_pads = true
# Brightness of mirrored pad LED (1-127)
mirror_brightness = 80
# Flash all pads briefly when MPC connects to confirm bridge is live
startup_flash = true
flash_brightness = 60
