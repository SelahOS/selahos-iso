# SelahOS — zram swap configuration
# zram-generator creates a compressed RAM swap device at boot.
# lz4 gives the best compression speed for real-time audio workloads.
# Size is capped at 4 GiB to keep audio latency predictable.

[zram0]
zram-size = min(ram, 4096)
compression-algorithm = lz4
swap-priority = 100
