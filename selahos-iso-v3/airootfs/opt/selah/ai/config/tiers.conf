# AI Lite — low-resource systems
AI_LITE_MIN_RAM_GB=4
AI_LITE_MODEL="tinyllama:1.1b"
AI_LITE_DESCRIPTION="Lightweight local AI for systems with limited RAM. Basic workflow assistance."

# AI Local — standard creator hardware
AI_LOCAL_MIN_RAM_GB=8
AI_LOCAL_MODEL="mistral:7b"
AI_LOCAL_DESCRIPTION="Standard local AI for everyday creator workflows. Recommended for most users."

# AI Studio — GPU-accelerated systems
AI_STUDIO_MIN_RAM_GB=16
AI_STUDIO_MIN_VRAM_GB=4
AI_STUDIO_MODEL="mistral:7b"
AI_STUDIO_DESCRIPTION="GPU-accelerated local AI for high-performance creative environments."

# Default Ollama port
OLLAMA_PORT=11434

# Default model pull behavior
# auto   = pull recommended model after install
# manual = user pulls manually
# none   = no model pulled (infrastructure only)
DEFAULT_PULL_BEHAVIOR="manual"
