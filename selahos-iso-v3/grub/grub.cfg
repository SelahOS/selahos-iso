set default="0"
set timeout=15
set timeout_style=menu

set gfxmode=auto
set gfxpayload=keep

if loadfont /boot/grub/fonts/unicode.pf2 ; then
    insmod all_video
    terminal_input console
    terminal_output gfxterm
elif loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    terminal_input console
    terminal_output gfxterm
fi

# NO copytoram — causes "no space left" on machines with limited RAM
# NO archisodevice — causes mount failure on Mac USB-C adapters
# USB modules are baked into initramfs so /dev/sda appears before archiso runs

# ── Smart Hardware Auto-Detection ─────────────────────────────
# Defaults: Kaby Lake+ / unknown modern hardware → linux-zen
set selahos_kernel="linux-zen"
set selahos_initrd="initramfs-linux-zen.img"
set selahos_label="SelahOS"
set selahos_params="acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_guc=2 mem_sleep_default=deep"

# Parameter sets keyed to CPU generation
set kp_ivy="acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_rc6=1 intel_idle.max_cstate=1 noapic"
set kp_broadwell="acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_rc6=1 intel_idle.max_cstate=4"
set kp_skylake="acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_rc6=1"

# Attempt DMI product-name detection via SMBIOS (graceful no-op if unavailable)
if insmod smbios; then
    if insmod regexp; then
        # SMBIOS Type 1, String 2 = Product Name
        if smbios -t 1 -s 2 --set dmi_product; then

            # ── Ivy Bridge (2012) ──────────────────────────────────
            # MacBookPro9,x / 10,x | MacBookAir5,x | iMac13,x | Macmini6,x
            if regexp -- "(MacBookPro9,|MacBookPro10,|MacBookAir5,|iMac13,|Macmini6,)" "$dmi_product"; then
                set selahos_kernel="linux-lts"
                set selahos_initrd="initramfs-linux-lts.img"
                set selahos_label="SelahOS LTS"
                set selahos_params="$kp_ivy"

            # ── Haswell (2013–2014) ────────────────────────────────
            # MacBookPro11,1-3 | MacBookAir6,x | iMac14,x / 15,x | Macmini7,x
            elif regexp -- "(MacBookPro11,[123]|MacBookAir6,|iMac14,|iMac15,|Macmini7,)" "$dmi_product"; then
                set selahos_kernel="linux-lts"
                set selahos_initrd="initramfs-linux-lts.img"
                set selahos_label="SelahOS LTS"
                set selahos_params="$kp_broadwell"

            # ── Broadwell / Skylake (2015–2016) ───────────────────
            # MacBookPro11,4-5 | MacBookPro12,x | MacBookPro13,x
            # MacBook8,x / 9,x | MacBookAir7,x | iMac16,x / 17,x
            elif regexp -- "(MacBookPro11,[45]|MacBookPro12,|MacBookPro13,|MacBook8,|MacBook9,|MacBookAir7,|iMac16,|iMac17,)" "$dmi_product"; then
                set selahos_kernel="linux-lts"
                set selahos_initrd="initramfs-linux-lts.img"
                set selahos_label="SelahOS LTS"
                set selahos_params="$kp_broadwell"

            # ── Kaby Lake+ (2017+) ─────────────────────────────────
            # MacBookPro14,x+ | MacBook10,x | MacBookAir8,x+ | iMac18,x+
            # Default set already; no action needed
            fi
        fi
    fi
fi

# ── Menu Entries ───────────────────────────────────────────────

menuentry "SelahOS — Auto-Detect Hardware (Recommended)" --class selahos --class gnu-linux --class gnu --class os --id 'selahos-auto' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-${selahos_kernel} archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G ${selahos_params}
    initrd /%INSTALL_DIR%/boot/x86_64/${selahos_initrd}
}

menuentry "SelahOS (linux-zen) — Kaby Lake+ / Modern" --class selahos --class gnu-linux --class gnu --class os --id 'selahos-zen' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_guc=2 mem_sleep_default=deep
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "SelahOS (linux-lts) — Broadwell / 2015" --class selahos --class gnu-linux --class gnu --class os --id 'selahos-lts-broadwell' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_rc6=1 intel_idle.max_cstate=4
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}

menuentry "SelahOS (linux-lts) — Ivy Bridge / 2012" --class selahos --class gnu-linux --class gnu --class os --id 'selahos-lts-ivy' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G acpi_osi=Darwin acpi_mask_gpe=0x57 pcie_aspm=off i915.enable_rc6=1 intel_idle.max_cstate=1 noapic
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}

menuentry "SelahOS — Safe Graphics (nomodeset)" --class selahos --class gnu-linux --class gnu --class os --id 'selahos-safe' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset acpi_osi=Darwin pcie_aspm=off
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "Reboot" { reboot }
menuentry "Shutdown" { halt }
