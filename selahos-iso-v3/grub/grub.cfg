set default="0"
set timeout=15
set timeout_style=menu

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    insmod all_video
    set gfxmode="auto"
    terminal_input console
    terminal_output gfxterm
fi

# NO copytoram — causes "no space left" on machines with limited RAM
# NO archisodevice — causes mount failure on Mac USB-C adapters
# USB modules are baked into initramfs so /dev/sda appears before archiso runs

menuentry "SelahOS v1.0-beta — Live Desktop" --class arch --class gnu-linux --class gnu --class os --id 'selahos-live' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "SelahOS v1.0-beta — Live Desktop (LTS kernel)" --class arch --class gnu-linux --class gnu --class os --id 'selahos-live-lts' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
}

menuentry "SelahOS v1.0-beta — Safe graphics" --class arch --class gnu-linux --class gnu --class os --id 'selahos-live-safe' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=4G nomodeset
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
}

menuentry "Reboot" { reboot }
menuentry "Shutdown" { halt }
