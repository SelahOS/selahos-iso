# ── SelahBridgePro Keygen — nginx config snippet ──────────────────────────────
# Add this inside your selahos.io server {} block, OR use as a separate
# server block for keys.selahos.io
#
# Option A — subdirectory:  selahos.io/activate
# Option B — subdomain:     keys.selahos.io  (replace server_name below)

server {
    listen 443 ssl http2;
    server_name keys.selahos.io;

    # SSL — managed by certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/keys.selahos.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keys.selahos.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Rate limit at nginx level (belt-and-suspenders)
    limit_req_zone $binary_remote_addr zone=keygen:10m rate=5r/m;

    location / {
        limit_req zone=keygen burst=5 nodelay;
        proxy_pass         http://127.0.0.1:5050;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name keys.selahos.io;
    return 301 https://$host$request_uri;
}
