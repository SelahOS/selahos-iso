<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelahOS Device Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e1e1e;
            --secondary: #2a2a2a;
            --accent: #D4AF37;
            --success: #44ff44;
            --danger: #ff4444;
            --text-primary: #ffffff;
            --text-secondary: #888888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        html, body, #app {
            height: 100%;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: var(--secondary);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent);
            color: var(--primary);
        }

        button:active {
            transform: scale(0.98);
        }

        input, select, textarea {
            background-color: var(--secondary);
            color: var(--text-primary);
            border: 1px solid var(--secondary);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .status-connected {
            color: var(--success);
        }

        .status-disconnected {
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
