name: Test Device Editors

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/device-editors/**'
      - 'tools/device-editors-web/**'
      - '.github/workflows/test-device-editors.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tools/device-editors/**'
      - 'tools/device-editors-web/**'

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-asyncio pydantic fastapi

      - name: Lint with flake8
        run: |
          flake8 tools/device-editors-web/scripting --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 tools/device-editors-web/scripting --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Test scripting module
        run: |
          cd tools/device-editors-web
          python -m pytest scripting/ -v || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'tools/device-editors-web/frontend/package.json'

      - name: Install dependencies
        run: |
          cd tools/device-editors-web/frontend
          npm install

      - name: Build Vue app
        run: |
          cd tools/device-editors-web/frontend
          npm run build

      - name: Verify build output
        run: |
          if [ ! -d "tools/device-editors-web/frontend/dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "✓ Frontend build successful"

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: |
          python -m py_compile tools/device-editors/*.py
          python -m py_compile tools/device-editors-web/scripting/**/*.py 2>/dev/null || true
          echo "✓ All Python files syntax valid"

      - name: Validate JSON schemas
        run: |
          python -c "
          import json
          import glob
          for file in glob.glob('tools/device-editors/**/*.json', recursive=True):
              try:
                  with open(file) as f:
                      json.load(f)
                  print(f'✓ {file}')
              except Exception as e:
                  print(f'✗ {file}: {e}')
                  exit(1)
          "

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Test macro imports
        run: |
          cd tools/device-editors-web
          python -c "from scripting import Macro, MacroBuilder, MacroLibrary, StandardMacros; print('✓ Macro system imports successfully')"

      - name: Test frontend build with API integration
        run: |
          cd tools/device-editors-web/frontend
          npm install
          npm run build
          test -d dist && echo "✓ Frontend builds successfully"

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check README files
        run: |
          files=(
            "tools/device-editors-web/frontend/README.md"
            "tools/device-editors-web/scripting/README.md"
          )
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found $file"
            else
              echo "✗ Missing $file"
              exit 1
            fi
          done

  report:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend, syntax-check, integration, documentation]
    if: always()
    steps:
      - uses: actions/checkout@v3

      - name: Summarize test results
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║          SelahOS Device Editors - CI/CD Report            ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Test Results:"
          echo "  Python Tests:        ${{ needs.test-python.result }}"
          echo "  Frontend Tests:      ${{ needs.test-frontend.result }}"
          echo "  Syntax Check:        ${{ needs.syntax-check.result }}"
          echo "  Integration:         ${{ needs.integration.result }}"
          echo "  Documentation:       ${{ needs.documentation.result }}"
          echo ""
          if [ "${{ needs.test-python.result }}" = "success" ] && \
             [ "${{ needs.test-frontend.result }}" = "success" ] && \
             [ "${{ needs.syntax-check.result }}" = "success" ] && \
             [ "${{ needs.integration.result }}" = "success" ] && \
             [ "${{ needs.documentation.result }}" = "success" ]; then
            echo "Overall Status: ✓ ALL TESTS PASSED"
            exit 0
          else
            echo "Overall Status: ✗ SOME TESTS FAILED"
            exit 1
          fi
